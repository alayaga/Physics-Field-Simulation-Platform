<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理场可视化：动态粒子与物理交互叠加</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0; --text: #1e293b; --accent: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }
        
        /* 左侧控制面板 */
        .sidebar { width: 340px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 15px rgba(0,0,0,0.03); z-index: 10; overflow-y: auto; }
        h1 { font-size: 1.25rem; padding-bottom: 10px; border-bottom: 2px solid var(--accent); color: #0f172a; margin-bottom: 5px; }
        
        .control-group { display: flex; flex-direction: column; gap: 6px; background: #f1f5f9; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .control-group label { font-weight: bold; font-size: 0.9rem; color: #334155; }
        .desc { font-size: 0.8rem; color: #64748b; line-height: 1.4; }
        
        select, input[type="range"] { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; cursor: pointer; font-size: 0.9rem; }
        select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        
        #mouseMode { border-color: #ef4444; background: #fef2f2; color: #b91c1c; font-weight: bold; }

        /* 右侧画布区域 */
        .canvas-container { flex: 1; position: relative; background: #ffffff; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; }

        /* 数学公式展示面板 (复刻视频) */
        .math-panel { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); pointer-events: none; border: 1px solid #e2e8f0; }
        .math-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 4px; color: #0f172a; }
        .math-formula { font-family: "Times New Roman", Times, serif; font-size: 1.25rem; font-style: italic; color: #1e293b; }
        .math-subtitle { font-size: 0.85rem; color: #64748b; margin-top: 6px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>终极物理场模拟台</h1>
        
        <div class="control-group">
            <label>📐 1. 选择全局背景场 (视频视觉)</label>
            <select id="baseField">
                <option value="gradient">梯度 (Gradient) - 等高线背景</option>
                <option value="curl">旋度 (Curl) - 蓝红漩涡色带</option>
                <option value="divergence" selected>散度 (Divergence) - 绿黄色带</option>
                <option value="uniform">均匀流场 (适合观察叠加效果)</option>
            </select>
            <div class="desc">切换基础物理场，将完全还原视频中三个概念独立的粒子和颜色视觉表现。</div>
        </div>

        <div class="control-group">
            <label>🖱️ 2. 鼠标局部扰动 (物理叠加)</label>
            <select id="mouseMode">
                <option value="none">关闭鼠标扰动</option>
                <option value="source">局部排斥源 (向外吹走粒子)</option>
                <option value="sink">局部吸引汇 (像黑洞一样吸入粒子)</option>
                <option value="vortex">局部漩涡 (逆时针搅拌粒子)</option>
            </select>
            <div class="desc">在画布上移动鼠标，鼠标将成为一个新的力场源，与全局背景场叠加，并实时改变红点粒子的运动轨迹！</div>
        </div>

        <div class="control-group">
            <label>网格箭头密度: <span id="densityVal">28</span></label>
            <input type="range" id="densitySlider" min="15" max="45" value="28">
        </div>
        
        <div class="control-group">
            <label>粒子运动速度: <span id="speedVal">1.0x</span></label>
            <input type="range" id="speedSlider" min="0.2" max="3.0" value="1.0" step="0.1">
        </div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="math-panel">
            <div class="math-title" id="mTitle">散度</div>
            <div class="math-formula" id="mFormula">∇·F = ∂u/∂x + ∂v/∂y</div>
            <div class="math-subtitle" id="mSub">向量场的源/汇程度</div>
        </div>
        <canvas id="vectorCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('vectorCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const UI = {
            baseField: document.getElementById('baseField'),
            mouseMode: document.getElementById('mouseMode'),
            density: document.getElementById('densitySlider'),
            speed: document.getElementById('speedSlider')
        };

        let config = {
            baseType: 'divergence',
            mouseMode: 'none',
            density: 28,
            speedScale: 1.0,
            viewBox: 4, 
            mouseX: 0, mouseY: 0, isMouseIn: false
        };

        let particles = [];
        let cWidth, cHeight, cOffsetX, cOffsetY, cScale;

        // --- 1. 背景场数学与视觉定义 (深度还原视频) ---
        const fields = {
            gradient: {
                title: "梯度", formula: "∇f = (∂f/∂x, ∂f/∂y)", sub: "标量场的最大变化方向",
                // 双峰模型，梯度指向山峰
                func: (x, y) => {
                    let d1 = (x+1.5)**2 + y**2, d2 = (x-1.5)**2 + y**2;
                    let u = 2*(x+1.5)*Math.exp(-d1) + 2*(x-1.5)*Math.exp(-d2);
                    let v = 2*y*Math.exp(-d1) + 2*y*Math.exp(-d2);
                    return { u: u*2, v: v*2 }; 
                },
                arrowColor: () => "#3b82f6", // 视频原图：纯蓝色箭头
                drawBg: (ctx) => { // 视频原图：红虚线等高线
                    ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(231, 76, 60, 0.3)"; ctx.lineWidth = 1.5;
                    [0.6, 1.2, 1.8].forEach(r => {
                        ctx.beginPath(); ctx.arc(cOffsetX - 1.5*cScale, cOffsetY, r*cScale, 0, Math.PI*2); ctx.stroke();
                        ctx.beginPath(); ctx.arc(cOffsetX + 1.5*cScale, cOffsetY, r*cScale, 0, Math.PI*2); ctx.stroke();
                    });
                    ctx.setLineDash([]);
                },
                initParticle: () => ({ x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8, life: 150 + Math.random()*100 })
            },
            curl: {
                title: "旋度", formula: "∇×F = ∂v/∂x - ∂u/∂y", sub: "向量场的旋转程度",
                func: (x, y) => ({ u: -y * 0.7, v: x * 0.7 }),
                arrowColor: (mag, maxMag) => { // 视频原图：蓝白红过渡
                    let t = Math.min(mag / (maxMag*0.8), 1);
                    if (t < 0.5) return `rgb(${parseInt(80+t*350)}, ${parseInt(150+t*210)}, 255)`; 
                    else return `rgb(255, ${parseInt(255-(t-0.5)*450)}, ${parseInt(255-(t-0.5)*450)})`; 
                },
                drawBg: () => {},
                initParticle: () => {
                    let angle = Math.random() * Math.PI * 2, r = 0.5 + Math.random() * 3.5;
                    return { x: Math.cos(angle)*r, y: Math.sin(angle)*r, life: 9999 }; // 永不消散的轨道
                }
            },
            divergence: {
                title: "散度", formula: "∇·F = ∂u/∂x + ∂v/∂y", sub: "向量场的源/汇程度",
                func: (x, y) => ({ u: x * 0.6, v: y * 0.6 }),
                arrowColor: (mag, maxMag) => { // 视频原图：绿黄紫渐变
                    let t = Math.min(mag / maxMag, 1);
                    return `hsl(${160 - t * 160}, 75%, 45%)`; 
                },
                drawBg: () => {},
                initParticle: () => {
                    let angle = Math.random() * Math.PI * 2, r = Math.random() * 0.3;
                    return { x: Math.cos(angle)*r, y: Math.sin(angle)*r, life: 80 + Math.random()*80 };
                }
            },
            uniform: {
                title: "均匀场", formula: "F(x,y) = (1.5, 0)", sub: "恒定流场，适合测试叠加干扰",
                func: () => ({ u: 1.5, v: 0 }),
                arrowColor: () => "#94a3b8",
                drawBg: () => {},
                initParticle: () => ({ x: -config.viewBox - Math.random(), y: (Math.random()-0.5)*8, life: 200 })
            }
        };

        // --- 核心：获得物理叠加后的最终向量 (网格和粒子共用物理引擎) ---
        function getCombinedVector(x, y) {
            let base = fields[config.baseType].func(x, y);
            let u = base.u, v = base.v;

            // 叠加鼠标干扰场
            if (config.isMouseIn && config.mouseMode !== 'none') {
                let dx = x - config.mouseX, dy = y - config.mouseY;
                let distSq = dx*dx + dy*dy;
                
                let falloff = Math.exp(-distSq / 2.0); // 影响范围
                let strength = 5.0 * falloff; // 干扰强度
                let dist = Math.sqrt(distSq) + 0.001; 
                let dirX = dx / dist, dirY = dy / dist;

                if (config.mouseMode === 'source') { u += dirX*strength; v += dirY*strength; }
                else if (config.mouseMode === 'sink') { u -= dirX*strength; v -= dirY*strength; }
                else if (config.mouseMode === 'vortex') { u -= dirY*strength; v += dirX*strength; }
            }
            return { u, v, mag: Math.sqrt(u*u + v*v) };
        }

        // --- 窗口自适应 ---
        function resize() {
            canvas.width = container.clientWidth; canvas.height = container.clientHeight;
            cWidth = canvas.width; cHeight = canvas.height;
            cOffsetX = cWidth / 2; cOffsetY = cHeight / 2;
            cScale = Math.min(cWidth, cHeight) / (config.viewBox * 2.2);
            resetParticles();
        }
        window.addEventListener('resize', resize);

        // 鼠标追踪
        function screenToMath(sx, sy) { return { x: (sx - cOffsetX)/cScale, y: -(sy - cOffsetY)/cScale }; }
        container.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            let p = screenToMath(e.clientX - rect.left, e.clientY - rect.top);
            config.mouseX = p.x; config.mouseY = p.y; config.isMouseIn = true;
        });
        container.addEventListener('mouseleave', () => { config.isMouseIn = false; });

        // --- 粒子系统 ---
        function resetParticles() {
            particles = [];
            let count = config.baseType === 'curl' ? 25 : 80; 
            for (let i = 0; i < count; i++) particles.push(fields[config.baseType].initParticle());
        }

        // --- 绘图辅助 ---
        function drawArrow(sx, sy, ex, ey, color) {
            let dx = ex - sx, dy = ey - sy;
            let len = Math.sqrt(dx*dx + dy*dy);
            if (len < 2) return; 
            let angle = Math.atan2(dy, dx);
            let headlen = Math.min(len * 0.25, 6); 
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
            ctx.lineTo(ex - headlen * Math.cos(angle - Math.PI/7), ey - headlen * Math.sin(angle - Math.PI/7));
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex - headlen * Math.cos(angle + Math.PI/7), ey - headlen * Math.sin(angle + Math.PI/7));
            ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.stroke();
        }

        // --- 主渲染循环 ---
        function render() {
            // 带有拖影的清理
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fillRect(0, 0, cWidth, cHeight);

            // 1. 绘制等高线等专属背景
            fields[config.baseType].drawBg(ctx);

            // 2. 绘制鼠标交互的光晕指示器
            if (config.isMouseIn && config.mouseMode !== 'none') {
                let sx = cOffsetX + config.mouseX * cScale, sy = cOffsetY - config.mouseY * cScale;
                let color = config.mouseMode === 'source' ? 'rgba(231,76,60,' : (config.mouseMode === 'sink' ? 'rgba(155,89,182,' : 'rgba(46,204,113,');
                let grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, cScale * 2);
                grad.addColorStop(0, color + '0.2)'); grad.addColorStop(1, color + '0)');
                ctx.beginPath(); ctx.arc(sx, sy, cScale * 2, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
            }

            // 3. 计算并绘制静态网格箭头场 (受鼠标干扰)
            const step = (config.viewBox * 2) / config.density;
            let maxMag = 0.001, gridData = [];
            
            for (let x = -config.viewBox; x <= config.viewBox; x += step) {
                for (let y = -config.viewBox; y <= config.viewBox; y += step) {
                    let vec = getCombinedVector(x, y);
                    if (vec.mag > maxMag) maxMag = vec.mag;
                    gridData.push({ x, y, ...vec });
                }
            }

            let baseLen = step * 0.7 * cScale;
            gridData.forEach(vd => {
                let sx = cOffsetX + vd.x * cScale, sy = cOffsetY - vd.y * cScale;
                let visualLen = config.baseType === 'gradient' ? baseLen * 0.6 : (vd.mag / maxMag) * baseLen * 1.5;
                if (vd.mag > 0.01) {
                    let ex = sx + (vd.u / vd.mag) * visualLen;
                    let ey = sy - (vd.v / vd.mag) * visualLen;
                    drawArrow(sx, sy, ex, ey, fields[config.baseType].arrowColor(vd.mag, maxMag));
                }
            });

            // 4. 粒子系统更新与绘制 (受鼠标干扰)
            ctx.fillStyle = '#ef4444'; // 鲜红粒子
            particles.forEach((p, idx) => {
                // 粒子读取叠加后的向量物理引擎
                let vec = getCombinedVector(p.x, p.y);
                
                // 根据向量移动
                let spd = 0.02 * config.speedScale;
                if (config.baseType === 'curl') spd *= 0.7; // 旋度里转慢点
                
                p.x += vec.u * spd; p.y += vec.v * spd;
                p.life--;

                // 死亡检测 (寿命结束 或 跑出屏幕外 或 陷入死胡同)
                let rSq = p.x*p.x + p.y*p.y;
                if (p.life <= 0 || rSq > 40 || (config.baseType === 'gradient' && vec.mag < 0.01 && config.mouseMode === 'none')) {
                    Object.assign(p, fields[config.baseType].initParticle()); // 重生
                }

                // 绘制粒子
                let sx = cOffsetX + p.x * cScale, sy = cOffsetY - p.y * cScale;
                let radius = (config.baseType === 'curl' && idx === 0) ? 6 : 2.5; // 特殊大红点还原视频
                
                ctx.beginPath(); ctx.arc(sx, sy, radius, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx, sy, radius*2.5, 0, Math.PI*2); ctx.fillStyle = 'rgba(239, 68, 68, 0.2)'; ctx.fill(); ctx.fillStyle = '#ef4444';
            });

            requestAnimationFrame(render);
        }

        // --- UI 事件绑定 ---
        function syncUI() {
            let f = fields[config.baseType];
            document.getElementById('mTitle').innerText = f.title;
            document.getElementById('mFormula').innerText = f.formula;
            document.getElementById('mSub').innerText = f.sub;
            document.getElementById('densityVal').innerText = config.density;
            document.getElementById('speedVal').innerText = config.speedScale.toFixed(1) + 'x';
        }

        UI.baseField.addEventListener('change', (e) => { config.baseType = e.target.value; syncUI(); resetParticles(); });
        UI.mouseMode.addEventListener('change', (e) => { config.mouseMode = e.target.value; });
        UI.density.addEventListener('input', (e) => { config.density = parseInt(e.target.value); syncUI(); });
        UI.speed.addEventListener('input', (e) => { config.speedScale = parseFloat(e.target.value); syncUI(); });

        // 启动
        resize();
        syncUI();
        render();

    </script>
</body>
</html>
